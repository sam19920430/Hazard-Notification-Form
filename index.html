<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>危害告知單全自動上傳系統</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f2f5; }
        [v-cloak] { display: none; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999; color: white;
        }
    </style>
</head>
<body>
    <div id="app" v-cloak class="min-h-screen flex flex-col">
        <div v-if="isLoading" class="loading-overlay">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-white mb-4"></div>
            <p class="text-lg font-bold">系統正在上傳圖片與資料...</p>
            <p class="text-sm opacity-70">請勿關閉或整理網頁</p>
        </div>

        <header class="bg-[#2c3e6d] text-white p-5 shadow-lg flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tight">📋 危害告知單自動上傳</h1>
                <p class="text-[10px] opacity-60 mt-1">Version: 2026.04.27 自動化版</p>
            </div>
            <button @click="resetForm" class="text-xs bg-white/10 hover:bg-red-500 px-3 py-1.5 rounded-full border border-white/20 transition-all">
                清空重來
            </button>
        </header>

        <main class="flex-grow max-w-4xl mx-auto w-full p-4">
            <div v-show="currentTab === 'info'" class="space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-[#2c3e6d] border-l-4 border-orange-400 pl-3 font-bold mb-6 text-lg">第一步：身分核對</h2>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 font-bold">廠商名稱 (靠行廠商)</label>
                            <input v-model="config.vendor" list="vendor-list" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="點擊選擇或輸入">
                            <datalist id="vendor-list">
                                <option v-for="v in vendorOptions" :value="v">{{ v }}</option>
                            </datalist>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1 font-bold">司機姓名</label>
                                <input v-model="config.driverName" type="text" class="w-full bg-blue-50 border border-blue-200 rounded-xl p-4 outline-none font-bold" placeholder="輸入姓名">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1 font-bold">司機工號</label>
                                <input v-model="config.driverId" type="text" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 outline-none" placeholder="輸入工號">
                            </div>
                        </div>
                    </div>
                </div>
                <button @click="currentTab = 'upload'" :disabled="!isInfoReady"
                        :class="['w-full py-5 rounded-2xl font-bold shadow-lg text-lg transition-all', 
                                 !isInfoReady ? 'bg-gray-300 text-gray-500' : 'bg-[#2c3e6d] text-white hover:bg-blue-800']">
                    下一步：拍攝單據 ➡️
                </button>
            </div>

            <div v-show="currentTab === 'upload'" class="space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center">
                    <h2 class="text-[#2c3e6d] border-l-4 border-orange-400 pl-3 font-bold mb-6 text-left">第二步：告知單拍照</h2>
                    
                    <div class="flex flex-col items-center justify-center border-2 border-dashed border-gray-200 rounded-2xl p-6 bg-gray-50">
                        <div v-if="!imagePreview">
                            <label class="cursor-pointer">
                                <div class="bg-blue-600 text-white px-8 py-4 rounded-full font-bold mb-3 inline-block shadow-lg active:scale-95 transition-all">📷 開啟相機拍照</div>
                                <input type="file" accept="image/*" capture="environment" @change="handleFileUpload" class="hidden">
                            </label>
                            <p class="text-gray-400 text-xs mt-2">請確保單據文字清晰、無反光</p>
                        </div>
                        
                        <div v-else class="relative w-full">
                            <img :src="imagePreview" class="rounded-xl shadow-lg w-full object-contain max-h-[50vh]">
                            <button @click="imagePreview = null" class="absolute -top-3 -right-3 bg-red-500 text-white w-10 h-10 rounded-full shadow-lg font-bold text-xl">✕</button>
                            <p class="mt-4 text-green-600 font-bold flex items-center justify-center gap-1">
                                <span>✅ 照片已就緒</span>
                            </p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <button @click="submitToCloud" :disabled="!imagePreview"
                            :class="['w-full py-6 rounded-2xl font-bold shadow-xl text-xl transition-all', 
                                     !imagePreview ? 'bg-gray-300 text-gray-500' : 'bg-green-600 text-white hover:bg-green-700 active:scale-95']">
                        📤 立即全自動上傳雲端
                    </button>
                    <button @click="currentTab = 'info'" class="w-full bg-white border border-gray-200 text-gray-500 py-3 rounded-xl font-bold">⬅️ 返回修改資訊</button>
                </div>
                
                <div style="position: absolute; left: -9999px;">
                    <div id="capture-area" style="background: white; width: 600px; padding: 40px; border: 1px solid #eee;">
                        <h1 style="font-size: 28px; font-weight: 900; color: #2c3e6d; border-bottom: 3px solid #2c3e6d; padding-bottom: 15px; margin-bottom: 25px;">危害告知單上傳憑證</h1>
                        <div style="font-size: 18px; line-height: 2; margin-bottom: 30px; color: #333;">
                            <p><strong>上傳日期：</strong>{{ todayDate }}</p>
                            <p><strong>廠商名稱：</strong>{{ config.vendor }}</p>
                            <p><strong>司機姓名：</strong>{{ config.driverName }}</p>
                            <p><strong>司機工號：</strong>{{ config.driverId || '未填寫' }}</p>
                        </div>
                        <div style="border: 2px solid #f0f0f0; border-radius: 10px; padding: 10px;">
                            <p style="font-weight: bold; margin-bottom: 10px; color: #666;">告知單原始影像：</p>
                            <img :src="imagePreview" style="width: 100%; border-radius: 5px;">
                        </div>
                        <p style="margin-top: 30px; text-align: center; color: #999; font-size: 12px;">此文件由振耀自動化系統生成</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, watch } = Vue;
        createApp({
            setup() {
                const currentTab = ref('info');
                const config = ref({ vendor: '', driverName: '', driverId: '' });
                const imagePreview = ref(null);
                const isLoading = ref(false);
                
                const GAS_URL = "https://script.google.com/macros/s/AKfycbxuOQWjB14yl3t2xdihTSln2aSFHjlj68R7Yxv1OFoUXSTtdVVdRTA6V7wtA8JsKptZ/exec";

                const vendorOptions = ref(['加福貨運有限公司', '洪立物流有限公司', '同樂交通運輸有限公司', '同新交通有限公司', '冠勤運輸有限公司','正派物流有限公司','安傑交通物流有限公司','品岦貨運有限公司','成騏貨運有限公司','永騰貨運有限公司','創新物流股份有限公司','立家貨運有限公司','吉鴻國際運輸有限公司','華碩國際聯合物流股份有限公司','峻富物流股份有限公司','昌億交通有限公司','仲華物流有限公司']);

                const todayDate = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
                const isInfoReady = computed(() => config.value.vendor.trim() !== "" && config.value.driverName.trim() !== "");

                onMounted(() => {
                    const saved = localStorage.getItem('driver_app_info');
                    if (saved) config.value = JSON.parse(saved);
                });
                watch(config, (val) => localStorage.setItem('driver_app_info', JSON.stringify(val)), { deep: true });

                const handleFileUpload = (event) => {
                    const file = event.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => { imagePreview.value = e.target.result; };
                        reader.readAsDataURL(file);
                    }
                };

                const resetForm = () => { if (confirm('確定要清空嗎？')) { location.reload(); } };

                const submitToCloud = async () => {
                    if (!confirm('確認資訊正確並開始上傳？')) return;
                    
                    isLoading.value = true;
                    try {
                        const area = document.getElementById('capture-area');
                        // 📸 截取合併後的圖，scale 設為 1.5 平衡畫質與檔案大小
                        const canvas = await html2canvas(area, { scale: 1.5, useCORS: true });
                        const base64Image = canvas.toDataURL('image/jpeg', 0.8); // 壓縮品質 0.8

                        const payload = {
                            vendor: config.value.vendor,
                            driverName: config.value.driverName,
                            driverId: config.value.driverId,
                            image: base64Image
                        };

                        const response = await fetch(GAS_URL, {
                            method: 'POST',
                            body: JSON.stringify(payload)
                        });

                        const result = await response.json();
                        if (result.result === 'success') {
                            alert('✅ 上傳成功！圖片已存入 Google Drive 且資料已寫入試算表。');
                            location.reload(); 
                        } else {
                            throw new Error(result.error || '傳輸過程發生錯誤');
                        }
                    } catch (e) {
                        console.error(e);
                        alert('❌ 上傳失敗！可能原因：網路中斷、GAS 網址錯誤或雲端空間不足。\n錯誤訊息：' + e.message);
                    } finally {
                        isLoading.value = false;
                    }
                };

                return { currentTab, config, vendorOptions, imagePreview, isLoading, isInfoReady, todayDate, handleFileUpload, resetForm, submitToCloud };
            }
        }).mount('#app');
    </script>
</body>
</html>
