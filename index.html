<!DOCTYPE html>

<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>危害告知單上傳系統</title>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');

        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8f9fa; }

        [v-cloak] { display: none; }

        .btn-step:active { transform: scale(0.98); }

        /* 隱藏原生檔案輸入框，改用精美的按鈕 */

        .file-input-hidden { display: none; }

    </style>

</head>

<body>

    <div id="app" v-cloak class="min-h-screen flex flex-col">

        <header class="bg-[#2c3e6d] text-white p-5 shadow-lg flex justify-between items-center">

            <div>

                <h1 class="text-xl font-bold tracking-tight">📋 危害告知單上傳系統</h1>

                <p class="text-[10px] opacity-60 mt-1">今天：{{ todayStr }}</p>

            </div>

            <button @click="resetForm" class="text-xs bg-white/10 hover:bg-red-500 px-3 py-1.5 rounded-full border border-white/20 transition-all">

                清空重來

            </button>

        </header>



        <main class="flex-grow max-w-4xl mx-auto w-full p-4">

            <div v-show="currentTab === 'info'" class="space-y-4">

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">

                    <h2 class="text-[#2c3e6d] border-l-4 border-orange-400 pl-3 font-bold mb-6">第一步：基本資訊</h2>

                    <div class="space-y-5">

                        <div>

                            <label class="block text-sm font-medium text-gray-700 mb-1">廠商名稱 (靠行蝦皮廠商) <span class="text-red-500">*</span></label>

                            <input v-model="config.vendor" list="vendor-list" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="請選擇或輸入廠商">

                            <datalist id="vendor-list">

                                <option v-for="v in vendorOptions" :value="v">{{ v }}</option>

                            </datalist>

                        </div>

                        <div class="grid grid-cols-2 gap-4">

                            <div>

                                <label class="block text-sm font-medium text-gray-700 mb-1 font-bold">司機姓名 <span class="text-red-500">*</span></label>

                                <input v-model="config.driverName" type="text" class="w-full bg-blue-50 border border-blue-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 font-bold" placeholder="姓名">

                            </div>

                            <div>

                                <label class="block text-sm font-medium text-gray-700 mb-1">司機工號</label>

                                <input v-model="config.driverId" type="text" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="工號">

                            </div>

                        </div>

                    </div>

                </div>

                <button @click="currentTab = 'upload'" :disabled="!isInfoReady"

                        :class="['btn-step w-full py-4 rounded-2xl font-bold shadow-lg transition-all', 

                                 !isInfoReady ? 'bg-gray-300 text-gray-500' : 'bg-[#2c3e6d] text-white hover:bg-blue-800']">

                    下一步：拍照上傳 ➡️

                </button>

            </div>



            <div v-show="currentTab === 'upload'" class="space-y-4">

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">

                    <h2 class="text-[#2c3e6d] border-l-4 border-orange-400 pl-3 font-bold mb-6">第二步：危害告知單上傳</h2>

                    

                    <div class="flex flex-col items-center justify-center border-2 border-dashed border-gray-200 rounded-2xl p-10 bg-gray-50 text-center">

                        <div v-if="!imagePreview">

                            <label class="cursor-pointer">

                                <div class="bg-blue-600 text-white px-6 py-3 rounded-full font-bold mb-3 inline-block shadow-md">📷 拍照或選取照片</div>

                                <input type="file" accept="image/*" capture="environment" @change="handleFileUpload" class="file-input-hidden">

                            </label>

                            <p class="text-gray-400 text-sm mt-2">請上傳當日簽署之告知單照片</p>

                        </div>

                        

                        <div v-else class="relative w-full">

                            <img :src="imagePreview" class="rounded-xl shadow-lg w-full object-contain max-h-[400px]">

                            <button @click="imagePreview = null" class="absolute -top-3 -right-3 bg-red-500 text-white w-8 h-8 rounded-full shadow-lg">✕</button>

                            <p class="mt-4 text-green-600 font-bold">✅ 照片已就緒</p>

                        </div>

                    </div>

                </div>



                <div class="grid grid-cols-2 gap-4">

                    <button @click="currentTab = 'info'" class="btn-step bg-white border border-gray-200 text-gray-600 py-4 rounded-2xl font-bold">⬅️ 上一步</button>

                    <button @click="submitData" :disabled="!imagePreview"

                            :class="['btn-step py-4 rounded-2xl font-bold shadow-lg', 

                                     !imagePreview ? 'bg-gray-300 text-gray-500' : 'bg-green-600 text-white hover:bg-green-700']">

                        📤 確認並完成下載

                    </button>

                </div>

                

                <div style="position: absolute; left: -9999px;">

                    <div id="capture-area" style="background: white; width: 600px; padding: 40px;">

                        <h1 style="font-size: 24px; font-weight: bold; color: #2c3e6d; border-bottom: 2px solid #2c3e6d; padding-bottom: 10px;">危害告知單上傳紀錄</h1>

                        <div style="margin-top: 20px; font-size: 16px;">

                            <p><strong>上傳日期：</strong>{{ todayStr }}</p>

                            <p><strong>廠商名稱：</strong>{{ config.vendor }}</p>

                            <p><strong>司機姓名：</strong>{{ config.driverName }}</p>

                            <p><strong>司機工號：</strong>{{ config.driverId || '---' }}</p>

                        </div>

                        <div style="margin-top: 20px;">

                            <p style="font-weight: bold; margin-bottom: 10px;">告知單影像：</p>

                            <img :src="imagePreview" style="width: 100%; border: 1px solid #ddd; border-radius: 8px;">

                        </div>

                    </div>

                </div>

            </div>

        </main>

    </div>



    <script>

        const { createApp, ref, computed, onMounted, watch } = Vue;

        createApp({

            setup() {

                const currentTab = ref('info');

                const config = ref({ vendor: '', driverName: '', driverId: '' });

                const imagePreview = ref(null);

                

                // ✨ 廠商選擇題選項 (你可以在此修改或增加)

                const vendorOptions = ref(['加福貨運有限公司', '洪立物流有限公司', '同樂交通運輸有限公司', '同新交通有限公司', '冠勤運輸有限公司','正派物流有限公司','安傑交通物流有限公司','品岦貨運有限公司','成騏貨運有限公司','永騰貨運有限公司','創新物流股份有限公司','立家貨運有限公司','吉鴻國際運輸有限公司','華碩國際聯合物流股份有限公司','峻富物流股份有限公司','昌億交通有限公司','仲華物流有限公司']);



                const todayStr = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });

                const isInfoReady = computed(() => config.value.vendor.trim() !== "" && config.value.driverName.trim() !== "");



                onMounted(() => {

                    const saved = localStorage.getItem('driver_app_info');

                    if (saved) config.value = JSON.parse(saved);

                });

                watch(config, (val) => localStorage.setItem('driver_app_info', JSON.stringify(val)), { deep: true });



                const handleFileUpload = (event) => {

                    const file = event.target.files[0];

                    if (file) {

                        const reader = new FileReader();

                        reader.onload = (e) => { imagePreview.value = e.target.result; };

                        reader.readAsDataURL(file);

                    }

                };



                const resetForm = () => { if (confirm('重置所有內容？')) { location.reload(); } };



                const submitData = async () => {

                    try {

                        const area = document.getElementById('capture-area');

                        const canvas = await html2canvas(area, { scale: 2, useCORS: true });

                        

                        const link = document.createElement('a');

                        link.href = canvas.toDataURL('image/jpeg', 0.9);

                        link.download = `危害告知_${config.value.driverName}_${new Date().getTime()}.jpg`;

                        link.click();



                        alert('✅ 上傳紀錄已生成！\n(此工具目前為離線生成圖片，若需連線資料庫請設定 GAS)');

                        if(confirm('是否清空重置？')) resetForm();

                    } catch (e) { alert('產出失敗'); }

                };



                return { currentTab, config, vendorOptions, imagePreview, isInfoReady, todayStr, handleFileUpload, resetForm, submitData };

            }

        }).mount('#app');

    </script>

</body>

</html>
